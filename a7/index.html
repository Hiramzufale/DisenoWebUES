<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width-device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Actividad 7: HTML5</title>
</head>
<body>

    <!-- Ejercicio 1: Estructura básica -->
    <h1>Bienvenido a los ejercicios de HTML5</h1>

    <!-- Ejercicio 2: Párrafos y enlaces -->
    <p>
        Este es un párrafo de ejemplo. Visita
        <a href="https://www.google.com" target="_blank">Google</a> para más información.
    </p>

    <p>
        Enlace a otra página web:
        <a href="pagina2.html" target="_blank">Dar clic para ir a otra página web</a>
    </p>

    <!-- Ejercicio 3: Listas -->
    <h2>Lista de tareas</h2>
    <ul>
        <li>Aprender HTML5</li>
        <li>Practicar CSS</li>
        <li>Explorar JavaScript</li>
    </ul>

    <!-- Ejercicio 4: Imágenes -->
    <h2>Imagen de ejemplo</h2>
    <img src="img/img1.jpg" alt="Imagen de ejemplo" height="200px" width="300px" />

    <!-- Ejercicio 5: Formularios básicos -->
    <h2>Formulario de contacto</h2>
    <form>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required /><br /><br />

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required /><br /><br />

        <label for="mensaje">Mensaje:</label><br />
        <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
        <br /><br />

        <button type="submit">Enviar</button>
    </form>

</body>
</html>
